services:
  postgres:
    image: postgres:16-alpine
    container_name: aichat-postgres
    environment:
      POSTGRES_DB: ai_chat
      POSTGRES_USER: ai_chat
      POSTGRES_PASSWORD: ai_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_chat -d ai_chat"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PIP_EXTRA_INSTALL_ARGS: "--trusted-host pypi.org --trusted-host files.pythonhosted.org"
    container_name: aichat-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: "3000"
      APP_NAME: "Local Host"
      APP_ENV: local
      LOG_LEVEL: info
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DATABASE: ai_chat
      PG_USER: ai_chat
      PG_PASSWORD: ai_chat
      PG_SSL: "false"
      RUN_MIGRATIONS_ON_STARTUP: "true"
      AUTH_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aichat-frontend
    environment:
      BACKEND_BASE_URL: http://backend:3000
    depends_on:
      - backend
    ports:
      - "8080:8080"
    # 👇 THIS IS THE NEW SECTION 👇
    volumes:
      - ./frontend:/app         # Links your local frontend folder to the container
      - /app/node_modules       # Prevents local node_modules from breaking the container
      - /app/.next              # (Optional) Add this if using Next.js to prevent cache errors

volumes:
  postgres-data: