services:
  postgres:
    image: postgres:16-alpine
    container_name: aichat-postgres
    environment:
      POSTGRES_DB: ai_chat
      POSTGRES_USER: ai_chat
      POSTGRES_PASSWORD: ai_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_chat -d ai_chat"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aichat-backend
    environment:
      NODE_ENV: development
      PORT: "3000"
      APP_NAME: Azure AI Chat
      APP_ENV: local
      LOG_LEVEL: info
      AI_PROVIDER: mock
      AI_MODEL: mock-gpt
      AI_SYSTEM_PROMPT: You are a helpful AI assistant.
      AI_TEMPERATURE: "0.2"
      AI_MAX_TOKENS: "1000"
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DATABASE: ai_chat
      PG_USER: ai_chat
      PG_PASSWORD: ai_chat
      PG_SSL: "false"
      RUN_MIGRATIONS_ON_STARTUP: "true"
      AUTH_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aichat-frontend
    environment:
      BACKEND_BASE_URL: http://backend:3000
    depends_on:
      - backend
    ports:
      - "8080:8080"

volumes:
  postgres-data:
