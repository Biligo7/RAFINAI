version: 2
updates:
  # Backend Python (FastAPI) — requirements.txt + dev tools in requirements-dev.txt
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]

  # Frontend npm — same policy. React/Vite/TS majors land via a deliberate
  # migration PR, not via Dependabot.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    groups:
      frontend-types:
        patterns: ["@types/*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      vite:
        patterns: ["vite", "@vitejs/*"]
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions majors are usually safe (runtime bumps); let them through.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    groups:
      actions:
        patterns: ["*"]

  # Docker — backend runs on Python 3.12 slim; frontend build uses Node LTS.
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
