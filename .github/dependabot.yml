version: 2
updates:
  # Backend npm — allow patches/minors and security bumps; majors for
  # framework-level deps are opened manually after a migration review.
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    groups:
      backend-types:
        patterns: ["@types/*"]
      pino:
        patterns: ["pino", "pino-http"]
    ignore:
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "compression"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/compression"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pino"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pino-http"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tsx"
        update-types: ["version-update:semver-major"]

  # Frontend npm — same policy. React/Vite/TS majors land via a deliberate
  # migration PR, not via Dependabot.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    groups:
      frontend-types:
        patterns: ["@types/*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      vite:
        patterns: ["vite", "@vitejs/*"]
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions majors are usually safe (runtime bumps); let them through.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    groups:
      actions:
        patterns: ["*"]

  # Docker — keep base images on the current Node major (tracks LTS the
  # rest of the toolchain runs on); patches/minors still flow.
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
